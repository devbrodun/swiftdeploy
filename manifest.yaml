services:
  image: swift-deploy-1-node:latest
  port: 3000
  mode: canary
  app_version: "1.0.0"
  restart_policy: unless-stopped
  log_volume: swiftdeploy-logs

nginx:
  image: nginx:latest
  port: 8080
  proxy_timeout: 30

network:
  name: swiftdeploy-net
  driver_type: bridge

contact: "devops@swiftdeploy.local"
