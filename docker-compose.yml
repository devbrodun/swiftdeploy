# Generated by swiftdeploy — do not edit manually.
# Edit manifest.yaml and run: swiftdeploy init

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  swiftdeploy-logs:

services:

  service:
    image: swift-deploy-1-node:latest
    restart: unless-stopped
    # Never expose service port to the host — all traffic routes through nginx
    expose:
      - "3000"
    environment:
      MODE:        "canary"
      APP_VERSION: "1.0.0"
      APP_PORT:    "3000"
    networks:
      - swiftdeploy-net
    volumes:
      - swiftdeploy-logs:/app/logs
    # Our custom app runs as non-root appuser (defined in Dockerfile)
    # We can safely drop all capabilities here
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # python3 is guaranteed in our image; wget/curl may not be
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - swiftdeploy-net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - swiftdeploy-logs:/var/log/nginx
    depends_on:
      service:
        condition: service_healthy
    # NOTE: nginx:latest needs to run as root briefly at startup to
    # chown its temp directories (/var/cache/nginx/*).
    # Dropping ALL capabilities prevents this and crashes nginx.
    # Security is still enforced: no host port exposure for the app,
    # read-only config mount, and dedicated network isolation.