# Generated by swiftdeploy — do not edit manually.
# Edit manifest.yaml and run: swiftdeploy init

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  swiftdeploy-logs:

services:

  service:
    image: swift-deploy-1-node:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      MODE:        "canary"
      APP_VERSION: "1.0.0"
      APP_PORT:    "3000"
    networks:
      - swiftdeploy-net
    volumes:
      - swiftdeploy-logs:/app/logs
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - swiftdeploy-net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - swiftdeploy-logs:/var/log/nginx
    depends_on:
      service:
        condition: service_healthy

  opa:
    image: openpolicyagent/opa:latest-rootless
    restart: unless-stopped
    # OPA is exposed to the HOST so the CLI can query it directly.
    # It is NOT routed through nginx — nginx has no rule for /v1/data.
    # This means OPA is reachable by swiftdeploy but not by public traffic.
    ports:
      - "8181:8181"
    networks:
      - swiftdeploy-net
    volumes:
      # Mount the entire policies/ directory so OPA loads all .rego files
      - ./policies:/policies:ro
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=error"
      # Load all rego files from /policies
      - "/policies"
